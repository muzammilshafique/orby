name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.0"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential zip

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install linuxdeploy
        id: install-linuxdeploy
        uses: miurahr/install-linuxdeploy-action@v1
        with:
          plugins: qt appimage
          
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          export QML_SOURCES_PATHS=qml/

          ${{ steps.install-linuxdeploy.outputs.linuxdeploy }} \
            --appdir AppDir \
            --plugin qt \
            --output appimage \
            --executable build/orby \
            --desktop-file linux/orby.desktop \
            --icon-file icons/orby.svg

      - name: Package Zip
        run: |
          mkdir package
          cp build/orby package/
          cp README.md package/ || true
          cp LICENSE package/ || true
          cd package
          zip -r ../orby-linux-x86_64.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            orby-linux-x86_64.zip
            *.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.0"
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        shell: powershell
        run: |
          mkdir package

          Copy-Item build\Release\Orby-Windows.exe package\
          Copy-Item build\Release\dummy.exe package\

          windeployqt `
            --release `
            --qmldir qml `
            --no-translations `
            package\Orby-Windows.exe

          if (Test-Path README.md) {
            Copy-Item README.md package\
          }

          if (Test-Path LICENSE) {
            Copy-Item LICENSE package\
          }

      - name: Zip
        shell: powershell
        run: |
          Compress-Archive `
            -Path package\* `
            -DestinationPath orby-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: orby-windows-x86_64.zip

  release:
    name: Publish Release
    needs:
      - build-linux
      - build-windows

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux/orby-linux-x86_64.zip
            windows/orby-windows-x86_64.zip
            linux/*.AppImage